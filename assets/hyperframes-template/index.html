<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1440" />
    <link rel="icon" href="data:," />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="./video.config.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background: #f4efe6;
      }

      body {
        color: #17140f;
        font-family: sans-serif;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background: #f4efe6;
      }

      .scene {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background: #f4efe6;
        will-change: opacity, filter, transform;
      }

      .base {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 76% 13%, rgba(205, 112, 80, 0.28), rgba(205, 112, 80, 0) 34%),
          radial-gradient(circle at 14% 80%, rgba(56, 84, 116, 0.15), rgba(56, 84, 116, 0) 38%),
          linear-gradient(125deg, #f6f2e9 0%, #f2e4d7 58%, #e8c4b5 100%);
      }

      .background-image {
        position: absolute;
        inset: -70px -520px auto -520px;
        width: 2160px;
        height: 920px;
        object-fit: cover;
        opacity: 0.2;
        filter: saturate(0.86) blur(0.4px);
      }

      .grain {
        position: absolute;
        inset: 0;
        opacity: 0.15;
        background-image:
          linear-gradient(rgba(23, 20, 15, 0.06) 1px, rgba(255, 255, 255, 0) 1px),
          linear-gradient(90deg, rgba(23, 20, 15, 0.045) 1px, rgba(255, 255, 255, 0) 1px);
        background-size: 56px 56px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.08));
      }

      .ghost {
        position: absolute;
        right: 24px;
        bottom: 230px;
        color: rgba(167, 78, 48, 0.13);
        font-family: sans-serif;
        font-size: 182px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.82;
        text-transform: uppercase;
      }

      .ghost::before {
        content: attr(data-word);
      }

      .rule-rail {
        position: absolute;
        top: 86px;
        bottom: 180px;
        left: 58px;
        width: 4px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(201, 96, 62, 0.94), rgba(56, 84, 116, 0.24));
      }

      .scene-content {
        position: relative;
        z-index: 4;
        display: flex;
        height: 100%;
        flex-direction: column;
        gap: 30px;
        padding: 86px 70px 180px 88px;
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .eyebrow,
      .chip {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        border-radius: 999px;
        font-family: monospace;
        letter-spacing: 0.03em;
        line-height: 1;
      }

      .eyebrow {
        max-width: 650px;
        padding: 12px 20px;
        border: 2px solid rgba(23, 20, 15, 0.14);
        background: rgba(255, 252, 244, 0.72);
        color: #776f62;
        font-size: 22px;
        text-transform: uppercase;
      }

      .chip {
        max-width: 330px;
        padding: 12px 18px;
        background: #17140f;
        color: #fff9ef;
        font-size: 21px;
      }

      .headline {
        max-width: 880px;
        color: #17140f;
        font-size: 76px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.16;
        text-shadow: 0 20px 70px rgba(255, 250, 239, 0.74);
      }

      .headline.is-large {
        font-size: 86px;
      }

      .headline span {
        display: block;
      }

      .accent-rule {
        width: 180px;
        height: 9px;
        margin-top: 28px;
        border-radius: 999px;
        background: linear-gradient(90deg, #cd704f, #17140f, #385474);
      }

      .note {
        max-width: 820px;
        margin-top: 30px;
        padding: 22px 26px;
        border: 2px solid rgba(23, 20, 15, 0.13);
        border-radius: 26px;
        background: rgba(255, 252, 244, 0.74);
        box-shadow: 0 28px 70px rgba(67, 47, 32, 0.15);
        color: #3d352b;
        font-size: 31px;
        font-weight: 700;
        line-height: 1.32;
      }

      .stage {
        position: relative;
        flex: 1;
        min-height: 560px;
      }

      .source-card {
        position: absolute;
        bottom: 12px;
        width: 514px;
        min-height: 590px;
        padding: 36px 36px 30px;
        border: 3px solid rgba(23, 20, 15, 0.13);
        border-radius: 34px;
        background: rgba(255, 252, 244, 0.94);
        box-shadow: 0 34px 90px rgba(67, 47, 32, 0.2);
        color: #17140f;
      }

      .source-card.is-right {
        right: 0;
        transform: rotate(1.8deg);
      }

      .source-card.is-left {
        left: 0;
        transform: rotate(-2deg);
      }

      .source-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        color: #8a533f;
        font-family: monospace;
        font-size: 20px;
        line-height: 1;
      }

      .source-dot {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #cd704f;
        box-shadow: 0 0 0 8px rgba(205, 112, 79, 0.12);
      }

      .source-title {
        margin-top: 48px;
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.07;
      }

      .source-body {
        margin-top: 24px;
        color: #4e463b;
        font-size: 28px;
        font-weight: 650;
        line-height: 1.24;
      }

      .source-meta {
        position: absolute;
        right: 36px;
        bottom: 30px;
        left: 36px;
        display: flex;
        justify-content: space-between;
        color: #897d6e;
        font-family: monospace;
        font-size: 19px;
      }

      .point-list {
        position: absolute;
        bottom: 72px;
        display: grid;
        width: 400px;
        gap: 16px;
      }

      .point-list.is-left {
        left: 0;
      }

      .point-list.is-right {
        right: 0;
      }

      .point {
        display: flex;
        min-height: 76px;
        align-items: center;
        padding: 16px 20px;
        border: 2px solid rgba(23, 20, 15, 0.12);
        border-radius: 23px;
        background: rgba(255, 252, 244, 0.79);
        box-shadow: 0 20px 58px rgba(67, 47, 32, 0.12);
        color: #17140f;
        font-size: 27px;
        font-weight: 850;
        line-height: 1.13;
      }

      .summary-strip {
        position: absolute;
        right: 0;
        bottom: 40px;
        left: 0;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }

      .summary-chip {
        min-height: 124px;
        padding: 18px 20px;
        border: 2px solid rgba(23, 20, 15, 0.12);
        border-radius: 24px;
        background: rgba(255, 252, 244, 0.76);
        box-shadow: 0 22px 70px rgba(67, 47, 32, 0.12);
      }

      .summary-chip b {
        display: block;
        margin-bottom: 8px;
        color: #cd704f;
        font-family: monospace;
        font-size: 19px;
      }

      .summary-chip span {
        display: block;
        font-size: 27px;
        font-weight: 850;
        line-height: 1.15;
      }

      .caption-rail {
        position: absolute;
        z-index: 12;
        right: 70px;
        bottom: 70px;
        left: 70px;
        display: flex;
        min-height: 94px;
        align-items: center;
        justify-content: center;
        padding: 20px 34px;
        border: 2px solid rgba(23, 20, 15, 0.16);
        border-radius: 30px;
        background: rgba(255, 252, 244, 0.86);
        box-shadow: 0 30px 88px rgba(67, 47, 32, 0.18);
        backdrop-filter: blur(12px);
      }

      .voice-caption {
        max-width: 880px;
        color: #17140f;
        font-size: 39px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.18;
        text-align: center;
      }

      .brand {
        position: absolute;
        z-index: 8;
        bottom: 24px;
        left: 88px;
        color: #51463a;
        font-family: monospace;
        font-size: 20px;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="50" data-width="1080" data-height="1440"></div>

    <script>
      window.__timelines = window.__timelines || {};

      var fallbackConfig = {
        duration: { targetSeconds: 50, width: 1080, height: 1440 },
        brand: { footer: "WeChat Weekly Video" },
        scenes: [
          {
            eyebrow: "Weekly",
            chip: "draft",
            headline: ["Video", "template"],
            note: "Run npm run sync before preview or render.",
            caption: "weekly video draft",
            speech: "Run sync first.",
            ghost: "Draft"
          }
        ]
      };

      var config = window.WWV_CONFIG || fallbackConfig;
      var root = document.getElementById("root");
      var duration = Number(config.duration && config.duration.targetSeconds ? config.duration.targetSeconds : 50);
      var scenes = Array.isArray(config.scenes) && config.scenes.length ? config.scenes : fallbackConfig.scenes;
      var sceneLength = duration / scenes.length;

      root.dataset.duration = String(duration);
      root.dataset.width = String(config.duration && config.duration.width ? config.duration.width : 1080);
      root.dataset.height = String(config.duration && config.duration.height ? config.duration.height : 1440);

      function el(tagName, className, text) {
        var node = document.createElement(tagName);
        if (className) node.className = className;
        if (typeof text === "string") node.textContent = text;
        return node;
      }

      function appendHeadline(parent, lines, large) {
        var headline = el("div", "headline" + (large ? " is-large" : ""));
        (Array.isArray(lines) && lines.length ? lines : ["Untitled"]).forEach(function (line) {
          headline.appendChild(el("span", "", line));
        });
        parent.appendChild(headline);
      }

      function buildSourceCard(card, right) {
        var sourceCard = el("div", "source-card " + (right ? "is-right" : "is-left"));
        var label = el("div", "source-label");
        label.appendChild(el("span", "", card.label || "source"));
        label.appendChild(el("span", "source-dot"));
        sourceCard.appendChild(label);
        sourceCard.appendChild(el("div", "source-title", card.title || "Source note"));
        sourceCard.appendChild(el("div", "source-body", card.body || ""));
        var meta = el("div", "source-meta");
        meta.appendChild(el("span", "", card.metaLeft || ""));
        meta.appendChild(el("span", "", card.metaRight || ""));
        sourceCard.appendChild(meta);
        return sourceCard;
      }

      function buildPoints(points, left) {
        var list = el("div", "point-list " + (left ? "is-left" : "is-right"));
        points.slice(0, 3).forEach(function (point) {
          list.appendChild(el("div", "point", point));
        });
        return list;
      }

      function buildSummary(scene) {
        var labels = scene.headline && scene.headline.length ? scene.headline : [scene.eyebrow, scene.chip, scene.caption];
        var strip = el("div", "summary-strip");
        labels.slice(0, 3).forEach(function (item, index) {
          var chip = el("div", "summary-chip");
          chip.appendChild(el("b", "", String(index + 1).padStart(2, "0")));
          chip.appendChild(el("span", "", item || "update"));
          strip.appendChild(chip);
        });
        return strip;
      }

      function buildScene(scene, index) {
        var id = "scene-" + String(index + 1).padStart(2, "0");
        var node = el("section", "scene");
        node.id = id;
        node.style.opacity = index === 0 ? "1" : "0";

        node.appendChild(el("div", "base"));

        if (config.brand && config.brand.backgroundImage) {
          var image = el("img", "background-image");
          image.src = config.brand.backgroundImage;
          image.alt = "";
          image.setAttribute("data-layout-allow-overflow", "");
          node.appendChild(image);
        }

        node.appendChild(el("div", "grain"));
        var ghost = el("div", "ghost");
        ghost.dataset.word = scene.ghost || scene.eyebrow || config.account || "Weekly";
        ghost.setAttribute("data-layout-ignore", "");
        node.appendChild(ghost);
        node.appendChild(el("div", "rule-rail"));

        var content = el("div", "scene-content");
        var top = el("div", "topline");
        top.appendChild(el("div", "eyebrow", scene.eyebrow || "Weekly"));
        top.appendChild(el("div", "chip", scene.chip || config.issueDate || "draft"));
        content.appendChild(top);

        var header = el("div");
        appendHeadline(header, scene.headline, index === 0 || index === scenes.length - 1);
        header.appendChild(el("div", "accent-rule"));
        header.appendChild(el("div", "note", scene.note || ""));
        content.appendChild(header);

        var stage = el("div", "stage");
        var cardOnRight = index % 2 === 1;
        if (Array.isArray(scene.points) && scene.points.length) {
          stage.appendChild(buildPoints(scene.points, cardOnRight));
        }
        if (scene.card) {
          stage.appendChild(buildSourceCard(scene.card, cardOnRight));
        } else if (!(Array.isArray(scene.points) && scene.points.length) && index > 0 && index < scenes.length - 1) {
          stage.appendChild(buildSummary(scene));
        }
        content.appendChild(stage);
        node.appendChild(content);
        return node;
      }

      scenes.forEach(function (scene, index) {
        root.appendChild(buildScene(scene, index));
      });

      var captionRail = el("div", "caption-rail");
      captionRail.appendChild(el("div", "voice-caption"));
      captionRail.querySelector(".voice-caption").id = "voice-caption";
      root.appendChild(captionRail);
      root.appendChild(el("div", "brand", (config.brand && config.brand.footer) || "WeChat Weekly Video"));

      var captions = scenes.map(function (scene, index) {
        var start = index * sceneLength + 0.35;
        var end = Math.min((index + 1) * sceneLength - 0.25, start + sceneLength - 0.55);
        return { start: start, end: end, text: scene.caption || scene.note || scene.eyebrow || "" };
      });

      var tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      function q(selector) {
        return document.querySelector(selector);
      }

      function animateSceneIn(id, start) {
        var selector = "#" + id;
        if (q(selector + " .background-image")) {
          tl.from(selector + " .background-image", { scale: 1.08, opacity: 0.04, duration: 1.1, ease: "power2.out" }, start + 0.08);
        }
        tl.from(selector + " .rule-rail", { scaleY: 0, transformOrigin: "top center", duration: 0.62, ease: "power4.out" }, start + 0.16);
        tl.from(selector + " .eyebrow", { y: 24, opacity: 0, duration: 0.46, ease: "back.out(1.35)" }, start + 0.22);
        tl.from(selector + " .chip", { y: 24, opacity: 0, scale: 0.94, duration: 0.42, ease: "power3.out" }, start + 0.3);
        tl.from(selector + " .headline span", { y: 48, opacity: 0, duration: 0.58, stagger: 0.08, ease: "expo.out" }, start + 0.5);
        tl.from(selector + " .accent-rule", { scaleX: 0, opacity: 0, transformOrigin: "left center", duration: 0.44, ease: "power4.out" }, start + 0.88);
        tl.from(selector + " .note", { y: 28, opacity: 0, scale: 0.98, duration: 0.5, ease: "power2.out" }, start + 1);
        if (q(selector + " .source-card")) {
          tl.from(selector + " .source-card", { y: 46, opacity: 0, scale: 0.96, duration: 0.62, stagger: 0.08, ease: "expo.out" }, start + 1.08);
        }
        if (q(selector + " .point")) {
          tl.from(selector + " .point", { x: -22, opacity: 0, duration: 0.42, stagger: 0.06, ease: "power3.out" }, start + 1.18);
        }
        if (q(selector + " .summary-chip")) {
          tl.from(selector + " .summary-chip", { y: 28, opacity: 0, scale: 0.98, duration: 0.46, stagger: 0.08, ease: "power3.out" }, start + 1.12);
        }
      }

      function crossfade(oldId, newId, start) {
        tl.to("#" + oldId, { filter: "blur(12px)", scale: 1.02, opacity: 0, duration: 0.48, ease: "power2.inOut" }, start);
        tl.fromTo(
          "#" + newId,
          { filter: "blur(12px)", scale: 0.985, opacity: 0 },
          { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.54, ease: "power2.inOut" },
          start + 0.08
        );
      }

      scenes.forEach(function (_scene, index) {
        var currentId = "scene-" + String(index + 1).padStart(2, "0");
        var start = index * sceneLength;
        if (index > 0) {
          var previousId = "scene-" + String(index).padStart(2, "0");
          crossfade(previousId, currentId, start);
        }
        animateSceneIn(currentId, start + (index === 0 ? 0 : 0.1));
      });

      captions.forEach(function (caption) {
        tl.set("#voice-caption", { textContent: caption.text, opacity: 0, y: 14 }, caption.start);
        tl.to("#voice-caption", { opacity: 1, y: 0, duration: 0.16, ease: "power2.out", overwrite: "auto" }, caption.start + 0.02);
        tl.to("#voice-caption", { opacity: 0, y: -8, duration: 0.12, ease: "power2.in", overwrite: "auto" }, Math.max(caption.start + 0.2, caption.end - 0.14));
        tl.set("#voice-caption", { opacity: 0 }, caption.end);
      });

      var finalSceneId = "scene-" + String(scenes.length).padStart(2, "0");
      tl.to("#" + finalSceneId, { opacity: 0, filter: "blur(18px)", duration: 0.65, ease: "power1.in" }, duration - 0.65);
      tl.to(".caption-rail", { opacity: 0, y: 18, duration: 0.35, ease: "power2.in" }, duration - 0.55);
      tl.to(".brand", { opacity: 0, duration: 0.35, ease: "power2.in" }, duration - 0.55);

      window.__timelines.main = tl;
    </script>
  </body>
</html>
