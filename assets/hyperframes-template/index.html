<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1440" />
    <link rel="icon" href="data:," />
    <script src="./assets/vendor/gsap.min.js"></script>
    <script src="./video.config.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background: #f4efe6;
      }

      body {
        color: #17140f;
        font-family: sans-serif;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background: #f4efe6;
      }

      .scene {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        background: #f4efe6;
        will-change: opacity, filter, transform;
      }

      .base {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 76% 13%, rgba(205, 112, 80, 0.28), rgba(205, 112, 80, 0) 34%),
          radial-gradient(circle at 14% 80%, rgba(56, 84, 116, 0.15), rgba(56, 84, 116, 0) 38%),
          linear-gradient(125deg, #f6f2e9 0%, #f2e4d7 58%, #e8c4b5 100%);
      }

      .background-image {
        position: absolute;
        inset: -70px -520px auto -520px;
        width: 2160px;
        height: 920px;
        object-fit: cover;
        opacity: 0.2;
        filter: saturate(0.86) blur(0.4px);
      }

      .grain {
        position: absolute;
        inset: 0;
        opacity: 0.15;
        background-image:
          linear-gradient(rgba(23, 20, 15, 0.06) 1px, rgba(255, 255, 255, 0) 1px),
          linear-gradient(90deg, rgba(23, 20, 15, 0.045) 1px, rgba(255, 255, 255, 0) 1px);
        background-size: 56px 56px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.08));
      }

      .motion-field {
        position: absolute;
        z-index: 2;
        inset: 0;
        overflow: hidden;
        opacity: 0.86;
        pointer-events: none;
      }

      .motion-streak {
        position: absolute;
        left: -980px;
        top: 330px;
        width: 980px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(205, 112, 79, 0.82), rgba(56, 84, 116, 0.74), rgba(255, 255, 255, 0));
        box-shadow: 0 0 38px rgba(205, 112, 79, 0.34);
        transform: rotate(-14deg);
      }

      .motion-streak.is-second {
        top: 910px;
        height: 7px;
        opacity: 0.62;
        transform: rotate(12deg);
      }

      .signal-line {
        position: absolute;
        left: 70px;
        right: 70px;
        top: 408px;
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(205, 112, 79, 0), rgba(205, 112, 79, 0.92), rgba(56, 84, 116, 0.78), rgba(205, 112, 79, 0));
        box-shadow: 0 0 30px rgba(205, 112, 79, 0.28);
        transform-origin: left center;
      }

      .signal-line.is-vertical {
        top: 86px;
        right: auto;
        bottom: 180px;
        left: 58px;
        width: 6px;
        height: auto;
        background: linear-gradient(180deg, rgba(205, 112, 79, 0.98), rgba(56, 84, 116, 0.24));
        transform-origin: top center;
      }

      .signal-line.is-short {
        top: 1050px;
        right: 76px;
        left: 410px;
        height: 7px;
        opacity: 0.72;
        background: linear-gradient(90deg, rgba(56, 84, 116, 0), rgba(56, 84, 116, 0.82), rgba(205, 112, 79, 0.84), rgba(56, 84, 116, 0));
        transform-origin: right center;
      }

      .motion-orb {
        position: absolute;
        width: 34px;
        height: 34px;
        border: 5px solid rgba(23, 20, 15, 0.34);
        border-radius: 999px;
        background: rgba(255, 252, 244, 0.68);
        box-shadow: 0 0 44px rgba(205, 112, 79, 0.38);
      }

      .motion-orb.is-a {
        top: 720px;
        left: 140px;
      }

      .motion-orb.is-b {
        right: 130px;
        bottom: 360px;
        width: 24px;
        height: 24px;
        border-color: rgba(205, 112, 79, 0.46);
      }

      .motion-radar {
        position: absolute;
        top: 170px;
        right: 72px;
        width: 230px;
        height: 230px;
        border: 4px solid rgba(23, 20, 15, 0.13);
        border-radius: 999px;
      }

      .motion-radar::after {
        position: absolute;
        inset: 36px;
        border-top: 5px solid rgba(205, 112, 79, 0.44);
        border-right: 5px solid rgba(56, 84, 116, 0.32);
        border-radius: 999px;
        content: "";
      }

      .ghost {
        position: absolute;
        right: 24px;
        bottom: 230px;
        color: rgba(167, 78, 48, 0.13);
        font-family: sans-serif;
        font-size: 182px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.82;
        text-transform: uppercase;
      }

      .ghost::before {
        content: attr(data-word);
      }

      .rule-rail {
        position: absolute;
        top: 86px;
        bottom: 180px;
        left: 58px;
        width: 4px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(201, 96, 62, 0.94), rgba(56, 84, 116, 0.24));
      }

      .scene-content {
        position: relative;
        z-index: 4;
        display: flex;
        height: 100%;
        flex-direction: column;
        gap: 30px;
        padding: 86px 70px 180px 88px;
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .eyebrow,
      .chip {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        border-radius: 999px;
        font-family: monospace;
        letter-spacing: 0.03em;
        line-height: 1;
      }

      .eyebrow {
        max-width: 650px;
        padding: 12px 20px;
        border: 2px solid rgba(23, 20, 15, 0.14);
        background: rgba(255, 252, 244, 0.72);
        color: #776f62;
        font-size: 22px;
        text-transform: uppercase;
      }

      .chip {
        max-width: 330px;
        padding: 12px 18px;
        background: #17140f;
        color: #fff9ef;
        font-size: 21px;
      }

      .headline {
        max-width: 880px;
        color: #17140f;
        font-size: 76px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.16;
        text-shadow: 0 20px 70px rgba(255, 250, 239, 0.74);
      }

      .headline.is-large {
        font-size: 86px;
      }

      .headline span {
        display: block;
      }

      .accent-rule {
        width: 180px;
        height: 9px;
        margin-top: 28px;
        border-radius: 999px;
        background: linear-gradient(90deg, #cd704f, #17140f, #385474);
      }

      .note {
        max-width: 820px;
        margin-top: 30px;
        padding: 22px 26px;
        border: 2px solid rgba(23, 20, 15, 0.13);
        border-radius: 26px;
        background: rgba(255, 252, 244, 0.74);
        box-shadow: 0 28px 70px rgba(67, 47, 32, 0.15);
        color: #3d352b;
        font-size: 31px;
        font-weight: 700;
        line-height: 1.32;
      }

      .stage {
        position: relative;
        flex: 1;
        min-height: 560px;
      }

      .source-card {
        position: absolute;
        bottom: 12px;
        width: 514px;
        min-height: 590px;
        padding: 36px 36px 30px;
        border: 3px solid rgba(23, 20, 15, 0.13);
        border-radius: 34px;
        background: rgba(255, 252, 244, 0.94);
        box-shadow: 0 34px 90px rgba(67, 47, 32, 0.2);
        color: #17140f;
      }

      .source-card.has-image {
        min-height: 648px;
      }

      .persona-image {
        width: 100%;
        height: 188px;
        margin-top: 26px;
        object-fit: contain;
        border: 2px solid rgba(23, 20, 15, 0.1);
        border-radius: 24px;
        background: rgba(255, 252, 244, 0.84);
      }

      .source-card.is-right {
        right: 0;
        transform: rotate(1.8deg);
      }

      .source-card.is-left {
        left: 0;
        transform: rotate(-2deg);
      }

      .source-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        color: #8a533f;
        font-family: monospace;
        font-size: 20px;
        line-height: 1;
      }

      .source-dot {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #cd704f;
        box-shadow: 0 0 0 8px rgba(205, 112, 79, 0.12);
      }

      .source-title {
        margin-top: 48px;
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.07;
      }

      .source-card.has-image .source-title {
        margin-top: 24px;
        font-size: 38px;
      }

      .source-card.has-image .source-body {
        font-size: 25px;
      }

      .source-body {
        margin-top: 24px;
        color: #4e463b;
        font-size: 28px;
        font-weight: 650;
        line-height: 1.24;
      }

      .source-meta {
        position: absolute;
        right: 36px;
        bottom: 30px;
        left: 36px;
        display: flex;
        justify-content: space-between;
        color: #897d6e;
        font-family: monospace;
        font-size: 19px;
      }

      .point-list {
        position: absolute;
        bottom: 72px;
        display: grid;
        width: 400px;
        gap: 16px;
      }

      .point-list.is-left {
        left: 0;
      }

      .point-list.is-right {
        right: 0;
      }

      .point {
        display: flex;
        min-height: 76px;
        align-items: center;
        padding: 16px 20px;
        border: 2px solid rgba(23, 20, 15, 0.12);
        border-radius: 23px;
        background: rgba(255, 252, 244, 0.79);
        box-shadow: 0 20px 58px rgba(67, 47, 32, 0.12);
        color: #17140f;
        font-size: 27px;
        font-weight: 850;
        line-height: 1.13;
      }

      .summary-strip {
        position: absolute;
        right: 0;
        bottom: 40px;
        left: 0;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }

      .summary-chip {
        min-height: 124px;
        padding: 18px 20px;
        border: 2px solid rgba(23, 20, 15, 0.12);
        border-radius: 24px;
        background: rgba(255, 252, 244, 0.76);
        box-shadow: 0 22px 70px rgba(67, 47, 32, 0.12);
      }

      .summary-chip b {
        display: block;
        margin-bottom: 8px;
        color: #cd704f;
        font-family: monospace;
        font-size: 19px;
      }

      .summary-chip span {
        display: block;
        font-size: 27px;
        font-weight: 850;
        line-height: 1.15;
      }

      .caption-rail {
        position: absolute;
        z-index: 12;
        right: 70px;
        bottom: 70px;
        left: 70px;
        display: flex;
        min-height: 94px;
        align-items: center;
        justify-content: center;
        padding: 20px 34px;
        border: 2px solid rgba(23, 20, 15, 0.16);
        border-radius: 30px;
        background: rgba(255, 252, 244, 0.86);
        box-shadow: 0 30px 88px rgba(67, 47, 32, 0.18);
        backdrop-filter: blur(12px);
      }

      .voice-caption {
        max-width: 880px;
        color: #17140f;
        font-size: 39px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.18;
        text-align: center;
      }

      .brand {
        position: absolute;
        z-index: 8;
        bottom: 24px;
        left: 88px;
        color: #51463a;
        font-family: monospace;
        font-size: 20px;
        letter-spacing: 0.04em;
      }

      .voice-logo {
        position: absolute;
        z-index: 11;
        right: 46px;
        bottom: 188px;
        width: 96px;
        height: 96px;
        border: 1px solid rgba(23, 20, 15, 0.08);
        border-radius: 24px;
        background: rgba(255, 252, 244, 0.7);
        box-shadow: 0 16px 38px rgba(67, 47, 32, 0.14);
        backdrop-filter: blur(12px);
        pointer-events: none;
        transform-origin: center;
      }

      .voice-logo-ring {
        display: none;
      }

      .voice-logo-core {
        position: absolute;
        inset: 9px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(23, 20, 15, 0.08);
        border-radius: 18px;
        background: rgba(255, 252, 244, 0.82);
      }

      .voice-logo-img {
        width: 88%;
        height: 88%;
        object-fit: contain;
      }

      .voice-logo-text {
        color: #17140f;
        font-family: monospace;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 0;
      }

      .voice-bars {
        position: absolute;
        right: 7px;
        bottom: 7px;
        display: flex;
        height: 20px;
        align-items: flex-end;
        gap: 4px;
      }

      .voice-bar {
        display: block;
        width: 4px;
        height: 16px;
        border-radius: 999px;
        background: linear-gradient(180deg, #cd704f, #385474);
        transform-origin: bottom center;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="50" data-width="1080" data-height="1440"></div>

    <script>
      window.__timelines = window.__timelines || {};

      var fallbackConfig = {
        duration: { targetSeconds: 50, width: 1080, height: 1440 },
        brand: { footer: "WeChat Weekly Video" },
        scenes: [
          {
            eyebrow: "Weekly",
            chip: "draft",
            headline: ["Video", "template"],
            note: "Run npm run sync before preview or render.",
            caption: "weekly video draft",
            speech: "Run sync first.",
            ghost: "Draft"
          }
        ]
      };

      var config = window.WWV_CONFIG || fallbackConfig;
      var root = document.getElementById("root");
      var duration = Number(config.duration && config.duration.targetSeconds ? config.duration.targetSeconds : 50);
      var scenes = Array.isArray(config.scenes) && config.scenes.length ? config.scenes : fallbackConfig.scenes;
      var sceneLength = duration / scenes.length;

      root.dataset.duration = String(duration);
      root.dataset.width = String(config.duration && config.duration.width ? config.duration.width : 1080);
      root.dataset.height = String(config.duration && config.duration.height ? config.duration.height : 1440);

      function el(tagName, className, text) {
        var node = document.createElement(tagName);
        if (className) node.className = className;
        if (typeof text === "string") node.textContent = text;
        return node;
      }

      function appendHeadline(parent, lines, large) {
        var headline = el("div", "headline" + (large ? " is-large" : ""));
        (Array.isArray(lines) && lines.length ? lines : ["Untitled"]).forEach(function (line) {
          headline.appendChild(el("span", "", line));
        });
        parent.appendChild(headline);
      }

      function buildSourceCard(card, right) {
        var sourceCard = el("div", "source-card " + (right ? "is-right" : "is-left") + (card.image ? " has-image" : ""));
        var label = el("div", "source-label");
        label.appendChild(el("span", "", card.label || "source"));
        label.appendChild(el("span", "source-dot"));
        sourceCard.appendChild(label);
        if (card.image) {
          var image = el("img", "persona-image");
          image.src = card.image;
          image.alt = "";
          sourceCard.appendChild(image);
        }
        sourceCard.appendChild(el("div", "source-title", card.title || "Source note"));
        sourceCard.appendChild(el("div", "source-body", card.body || ""));
        var meta = el("div", "source-meta");
        meta.appendChild(el("span", "", card.metaLeft || ""));
        meta.appendChild(el("span", "", card.metaRight || ""));
        sourceCard.appendChild(meta);
        return sourceCard;
      }

      function buildPoints(points, left) {
        var list = el("div", "point-list " + (left ? "is-left" : "is-right"));
        points.slice(0, 3).forEach(function (point) {
          list.appendChild(el("div", "point", point));
        });
        return list;
      }

      function buildSummary(scene) {
        var labels = scene.headline && scene.headline.length ? scene.headline : [scene.eyebrow, scene.chip, scene.caption];
        var strip = el("div", "summary-strip");
        labels.slice(0, 3).forEach(function (item, index) {
          var chip = el("div", "summary-chip");
          chip.appendChild(el("b", "", String(index + 1).padStart(2, "0")));
          chip.appendChild(el("span", "", item || "update"));
          strip.appendChild(chip);
        });
        return strip;
      }

      function sceneLogoSource(scene) {
        return scene.logo || (config.brand && config.brand.logo) || "";
      }

      function sceneLogoLabel(scene) {
        var raw =
          (Array.isArray(scene.headline) && scene.headline.length && scene.headline[0]) ||
          scene.eyebrow ||
          (config.brand && config.brand.name) ||
          config.account ||
          "AI";
        return String(raw).replace(/[^\w\u4e00-\u9fa5]/g, "").slice(0, 6) || "AI";
      }

      function buildVoiceLogo(scene) {
        var logo = el("div", "voice-logo");
        logo.setAttribute("data-layout-ignore", "");
        logo.setAttribute("data-layout-allow-overflow", "");
        logo.appendChild(el("div", "voice-logo-ring"));
        var core = el("div", "voice-logo-core");
        var source = sceneLogoSource(scene);
        if (source) {
          var image = el("img", "voice-logo-img");
          image.src = source;
          image.alt = "";
          core.appendChild(image);
        } else {
          core.appendChild(el("span", "voice-logo-text", sceneLogoLabel(scene)));
        }
        logo.appendChild(core);
        var bars = el("div", "voice-bars");
        for (var i = 0; i < 4; i += 1) {
          bars.appendChild(el("i", "voice-bar"));
        }
        logo.appendChild(bars);
        return logo;
      }

      function buildScene(scene, index) {
        var id = "scene-" + String(index + 1).padStart(2, "0");
        var node = el("section", "scene");
        node.id = id;
        node.style.opacity = index === 0 ? "1" : "0";

        var base = el("div", "base");
        base.setAttribute("data-layout-allow-overflow", "");
        node.appendChild(base);

        if (config.brand && config.brand.backgroundImage) {
          var image = el("img", "background-image");
          image.src = config.brand.backgroundImage;
          image.alt = "";
          image.setAttribute("data-layout-allow-overflow", "");
          node.appendChild(image);
        }

        node.appendChild(el("div", "grain"));
        var motion = el("div", "motion-field");
        motion.setAttribute("data-layout-ignore", "");
        motion.setAttribute("data-layout-allow-overflow", "");
        motion.appendChild(el("div", "motion-streak"));
        motion.appendChild(el("div", "motion-streak is-second"));
        motion.appendChild(el("div", "signal-line is-horizontal"));
        motion.appendChild(el("div", "signal-line is-vertical"));
        motion.appendChild(el("div", "signal-line is-short"));
        motion.appendChild(el("div", "motion-orb is-a"));
        motion.appendChild(el("div", "motion-orb is-b"));
        motion.appendChild(el("div", "motion-radar"));
        node.appendChild(motion);
        var ghost = el("div", "ghost");
        ghost.dataset.word = scene.ghost || scene.eyebrow || config.account || "Weekly";
        ghost.setAttribute("data-layout-ignore", "");
        node.appendChild(ghost);
        node.appendChild(el("div", "rule-rail"));

        var content = el("div", "scene-content");
        var top = el("div", "topline");
        top.appendChild(el("div", "eyebrow", scene.eyebrow || "Weekly"));
        top.appendChild(el("div", "chip", scene.chip || config.issueDate || "draft"));
        content.appendChild(top);

        var header = el("div");
        appendHeadline(header, scene.headline, index === 0 || index === scenes.length - 1);
        header.appendChild(el("div", "accent-rule"));
        header.appendChild(el("div", "note", scene.note || ""));
        content.appendChild(header);

        var stage = el("div", "stage");
        var cardOnRight = index % 2 === 1;
        if (Array.isArray(scene.points) && scene.points.length) {
          stage.appendChild(buildPoints(scene.points, cardOnRight));
        }
        if (scene.card) {
          stage.appendChild(buildSourceCard(scene.card, cardOnRight));
        } else if (!(Array.isArray(scene.points) && scene.points.length) && index > 0 && index < scenes.length - 1) {
          stage.appendChild(buildSummary(scene));
        }
        content.appendChild(stage);
        node.appendChild(content);
        node.appendChild(buildVoiceLogo(scene));
        return node;
      }

      scenes.forEach(function (scene, index) {
        root.appendChild(buildScene(scene, index));
      });

      var captionRail = el("div", "caption-rail");
      captionRail.appendChild(el("div", "voice-caption"));
      captionRail.querySelector(".voice-caption").id = "voice-caption";
      root.appendChild(captionRail);
      root.appendChild(el("div", "brand", (config.brand && config.brand.footer) || "WeChat Weekly Video"));

      var captions = scenes.map(function (scene, index) {
        var start = index * sceneLength + 0.35;
        var end = Math.min((index + 1) * sceneLength - 0.25, start + sceneLength - 0.55);
        return { start: start, end: end, text: scene.caption || scene.note || scene.eyebrow || "" };
      });

      var tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      function q(selector) {
        return document.querySelector(selector);
      }

      function animateSceneIn(id, start) {
        var selector = "#" + id;
        if (q(selector + " .background-image")) {
          tl.from(selector + " .background-image", { scale: 1.08, opacity: 0.04, duration: 1.1, ease: "power2.out" }, start + 0.08);
        }
        tl.from(selector + " .rule-rail", { scaleY: 0, transformOrigin: "top center", duration: 0.62, ease: "power4.out" }, start + 0.16);
        tl.from(selector + " .eyebrow", { y: 24, opacity: 0, duration: 0.46, ease: "back.out(1.35)" }, start + 0.22);
        tl.from(selector + " .chip", { y: 24, opacity: 0, scale: 0.94, duration: 0.42, ease: "power3.out" }, start + 0.3);
        tl.from(selector + " .headline span", { y: 48, opacity: 0, duration: 0.58, stagger: 0.08, ease: "expo.out" }, start + 0.5);
        tl.from(selector + " .accent-rule", { scaleX: 0, opacity: 0, transformOrigin: "left center", duration: 0.44, ease: "power4.out" }, start + 0.88);
        tl.from(selector + " .note", { y: 28, opacity: 0, scale: 0.98, duration: 0.5, ease: "power2.out" }, start + 1);
        if (q(selector + " .source-card")) {
          tl.from(selector + " .source-card", { y: 46, opacity: 0, scale: 0.96, duration: 0.62, stagger: 0.08, ease: "expo.out" }, start + 1.08);
        }
        if (q(selector + " .point")) {
          tl.from(selector + " .point", { x: -22, opacity: 0, duration: 0.42, stagger: 0.06, ease: "power3.out" }, start + 1.18);
        }
        if (q(selector + " .summary-chip")) {
          tl.from(selector + " .summary-chip", { y: 28, opacity: 0, scale: 0.98, duration: 0.46, stagger: 0.08, ease: "power3.out" }, start + 1.12);
        }
        tl.from(selector + " .voice-logo", { y: 34, opacity: 0, scale: 0.68, duration: 0.58, ease: "back.out(1.6)" }, start + 1.16);
      }

      function animateSignalPulses(selector, holdStart, end) {
        var step = 0.72;
        var t = holdStart;
        var beat = 0;
        while (t < end - 0.08) {
          var grow = Math.min(0.32, end - t);
          var shrink = Math.min(0.34, Math.max(0, end - t - grow));
          var strong = beat % 3 === 0;
          tl.to(selector + " .signal-line.is-horizontal", { scaleX: strong ? 1.08 : 0.84, opacity: strong ? 0.96 : 0.7, duration: grow, ease: "sine.inOut" }, t);
          tl.to(selector + " .signal-line.is-horizontal", { scaleX: strong ? 0.34 : 0.48, opacity: 0.44, duration: shrink, ease: "sine.inOut" }, t + grow);
          tl.to(selector + " .signal-line.is-vertical", { scaleY: strong ? 1 : 0.82, opacity: strong ? 0.96 : 0.76, duration: grow, ease: "sine.inOut" }, t + 0.06);
          tl.to(selector + " .signal-line.is-vertical", { scaleY: strong ? 0.3 : 0.44, opacity: 0.42, duration: shrink, ease: "sine.inOut" }, t + grow + 0.06);
          tl.to(selector + " .signal-line.is-short", { scaleX: strong ? 0.98 : 0.74, opacity: strong ? 0.88 : 0.64, duration: grow, ease: "sine.inOut" }, t + 0.12);
          tl.to(selector + " .signal-line.is-short", { scaleX: strong ? 0.24 : 0.36, opacity: 0.34, duration: shrink, ease: "sine.inOut" }, t + grow + 0.12);
          t += step;
          beat += 1;
        }
      }

      function animateVoiceLogo(selector, index, holdStart, end) {
        var t = holdStart + 0.1;
        var beat = 0;
        while (t < end - 0.1) {
          var energy = 0.62 + Math.abs(Math.sin((beat + 1) * (index + 2) * 1.37)) * 0.38;
          var up = 0.16;
          var down = 0.24;
          tl.to(selector + " .voice-logo", { scale: 0.98 + energy * 0.16, duration: up, ease: "power2.out" }, t);
          tl.to(selector + " .voice-logo", { scale: 1, duration: down, ease: "sine.out" }, t + up);
          tl.to(selector + " .voice-logo-ring", { scale: 1.04 + energy * 0.24, opacity: 0.2 + energy * 0.42, duration: up, ease: "power2.out" }, t);
          tl.to(selector + " .voice-logo-ring", { scale: 1, opacity: 0.34, duration: down, ease: "sine.out" }, t + up);
          tl.to(selector + " .voice-logo-core", { scale: 0.98 + energy * 0.1, filter: "saturate(" + (1.05 + energy * 0.35) + ")", duration: up, ease: "power2.out" }, t);
          tl.to(selector + " .voice-logo-core", { scale: 1, filter: "saturate(1)", duration: down, ease: "sine.out" }, t + up);
          tl.to(selector + " .voice-bar", { scaleY: function (i) { return 0.36 + energy * (0.46 + i * 0.11); }, opacity: 0.55 + energy * 0.4, duration: up, stagger: 0.025, ease: "power2.out" }, t);
          tl.to(selector + " .voice-bar", { scaleY: 0.3, opacity: 0.52, duration: down, stagger: 0.018, ease: "sine.out" }, t + up);
          t += 0.42;
          beat += 1;
        }
      }

      function animateSceneHold(id, index, start, end) {
        var selector = "#" + id;
        var holdStart = start + 1.55;
        var holdDuration = Math.max(0.6, end - holdStart);
        var dir = index % 2 === 0 ? 1 : -1;
        if (q(selector + " .background-image")) {
          tl.to(selector + " .background-image", { x: 90 * dir, y: -42, scale: 1.09, duration: holdDuration, ease: "sine.inOut" }, holdStart);
        }
        tl.fromTo(selector + " .motion-streak:not(.is-second)", { x: -160, opacity: 0.18 }, { x: 2380, opacity: 0.9, duration: holdDuration, ease: "none" }, holdStart);
        tl.fromTo(selector + " .motion-streak.is-second", { x: 1640, opacity: 0.12 }, { x: -1180, opacity: 0.72, duration: holdDuration, ease: "none" }, holdStart + 0.35);
        animateSignalPulses(selector, holdStart, end);
        animateVoiceLogo(selector, index, holdStart, end);
        tl.to(selector + " .motion-orb.is-a", { x: 680 * dir, y: -250, scale: 1.75, duration: holdDuration, ease: "none" }, holdStart + 0.12);
        tl.to(selector + " .motion-orb.is-b", { x: -520 * dir, y: 260, scale: 1.55, duration: holdDuration, ease: "none" }, holdStart + 0.28);
        tl.to(selector + " .motion-radar", { rotation: 180 * dir, scale: 1.18, x: 42 * dir, y: 24, duration: holdDuration, ease: "none" }, holdStart);
        tl.to(selector + " .base", { scale: 1.045, x: -36 * dir, y: 22, duration: holdDuration, ease: "sine.inOut" }, holdStart);
        tl.to(selector + " .ghost", { x: 92 * dir, y: -56, opacity: 0.92, duration: holdDuration, ease: "sine.inOut" }, holdStart + 0.05);
        tl.to(selector + " .headline", { x: 20 * dir, y: -14, duration: holdDuration, ease: "sine.inOut" }, holdStart + 0.08);
        tl.to(selector + " .note", { x: -20 * dir, y: 14, duration: holdDuration, ease: "sine.inOut" }, holdStart + 0.12);
        if (q(selector + " .source-card")) {
          tl.to(selector + " .source-card", { x: 34 * dir, y: -30, rotation: dir * 3.4, scale: 1.035, duration: holdDuration, ease: "sine.inOut" }, holdStart + 0.16);
        }
        if (q(selector + " .point")) {
          tl.to(selector + " .point", { x: 28 * dir, y: -24, scale: 1.025, duration: holdDuration, stagger: 0.08, ease: "sine.inOut" }, holdStart + 0.22);
        }
        if (q(selector + " .summary-chip")) {
          tl.to(selector + " .summary-chip", { x: 22 * dir, y: -24, scale: 1.03, duration: holdDuration, stagger: 0.06, ease: "sine.inOut" }, holdStart + 0.2);
        }
      }

      function crossfade(oldId, newId, start) {
        tl.to("#" + oldId, { filter: "blur(12px)", scale: 1.02, opacity: 0, duration: 0.48, ease: "power2.inOut" }, start);
        tl.fromTo(
          "#" + newId,
          { filter: "blur(12px)", scale: 0.985, opacity: 0 },
          { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.54, ease: "power2.inOut" },
          start + 0.08
        );
      }

      scenes.forEach(function (_scene, index) {
        var currentId = "scene-" + String(index + 1).padStart(2, "0");
        var start = index * sceneLength;
        if (index > 0) {
          var previousId = "scene-" + String(index).padStart(2, "0");
          crossfade(previousId, currentId, start);
        }
        animateSceneIn(currentId, start + (index === 0 ? 0 : 0.1));
        animateSceneHold(currentId, index, start, Math.min(duration - 0.7, (index + 1) * sceneLength - 0.55));
      });

      captions.forEach(function (caption) {
        tl.set("#voice-caption", { textContent: caption.text, opacity: 0, y: 14 }, caption.start);
        tl.to("#voice-caption", { opacity: 1, y: 0, duration: 0.16, ease: "power2.out", overwrite: "auto" }, caption.start + 0.02);
        tl.to("#voice-caption", { opacity: 0, y: -8, duration: 0.12, ease: "power2.in", overwrite: "auto" }, Math.max(caption.start + 0.2, caption.end - 0.14));
        tl.set("#voice-caption", { opacity: 0 }, caption.end);
      });

      var finalSceneId = "scene-" + String(scenes.length).padStart(2, "0");
      tl.to("#" + finalSceneId, { opacity: 0, filter: "blur(18px)", duration: 0.65, ease: "power1.in" }, duration - 0.65);
      tl.to(".caption-rail", { opacity: 0, y: 18, duration: 0.35, ease: "power2.in" }, duration - 0.55);
      tl.to(".brand", { opacity: 0, duration: 0.35, ease: "power2.in" }, duration - 0.55);

      window.__timelines.main = tl;
    </script>
  </body>
</html>
